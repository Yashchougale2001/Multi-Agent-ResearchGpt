<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" stroke="#3B82F6" stroke-width="5"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Brain/Network Icon -->
  <g transform="translate(50, 50)">
    <!-- Central Node -->
    <circle cx="50" cy="50" r="8" fill="white"/>
    
    <!-- Top Node -->
    <circle cx="50" cy="20" r="6" fill="white" opacity="0.9"/>
    <line x1="50" y1="50" x2="50" y2="20" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- Right Node -->
    <circle cx="80" cy="50" r="6" fill="white" opacity="0.9"/>
    <line x1="50" y1="50" x2="80" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- Bottom Node -->
    <circle cx="50" cy="80" r="6" fill="white" opacity="0.9"/>
    <line x1="50" y1="50" x2="50" y2="80" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- Left Node -->
    <circle cx="20" cy="50" r="6" fill="white" opacity="0.9"/>
    <line x1="50" y1="50" x2="20" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
    
    <!-- Diagonal Nodes -->
    <circle cx="70" cy="30" r="5" fill="white" opacity="0.8"/>
    <line x1="50" y1="50" x2="70" y2="30" stroke="white" stroke-width="1.5" opacity="0.5"/>
    
    <circle cx="70" cy="70" r="5" fill="white" opacity="0.8"/>
    <line x1="50" y1="50" x2="70" y2="70" stroke="white" stroke-width="1.5" opacity="0.5"/>
    
    <circle cx="30" cy="30" r="5" fill="white" opacity="0.8"/>
    <line x1="50" y1="50" x2="30" y2="30" stroke="white" stroke-width="1.5" opacity="0.5"/>
    
    <circle cx="30" cy="70" r="5" fill="white" opacity="0.8"/>
    <line x1="50" y1="50" x2="30" y2="70" stroke="white" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="180" font-family="Inter, sans-serif" font-size="16" font-weight="bold" 
        text-anchor="middle" fill="white">Research AI</text>
</svg>